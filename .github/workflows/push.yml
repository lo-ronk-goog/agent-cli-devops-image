name: Build and Push Image

on:
  push:
    branches: [ main ]
    tags:
      - 'v*'

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }} # Requires a Service Account key secret

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for Artifact Registry
        run: |
          # Replace us-central1 with your actual region if different
          gcloud auth configure-docker us-central1-docker.pkg.dev

      - name: Build and Push
        run: |
          # TODO: Replace with your actual GCP Project ID and Registry name
          REGISTRY="us-central1-docker.pkg.dev/YOUR_PROJECT_ID/YOUR_REGISTRY_NAME"
          IMAGE_NAME="$REGISTRY/agent-cli-runner"
          
          TAG="latest"
          if [[ $GITHUB_REF == refs/tags/* ]]; then
            TAG=${GITHUB_REF#refs/tags/}
          fi
          
          docker build -t $IMAGE_NAME:$TAG .
          docker push $IMAGE_NAME:$TAG
          
          # Also push 'latest' tag if it's a version tag
          if [ "$TAG" != "latest" ]; then
            docker tag $IMAGE_NAME:$TAG $IMAGE_NAME:latest
            docker push $IMAGE_NAME:latest
          fi
